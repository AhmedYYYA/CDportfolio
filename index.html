<!DOCTYPE html>
<html lang="en-GB" dir="ltr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex">
<title>Falcon Aviation Command — Demonstration</title>
<meta name="description" content="Demonstration environment — synthetic data — not operational. Capability portfolio and lifecycle control tower demo.">
<style>
/* FALCON AVIATION COMMAND — refined institutional design system v1.1
   Palette per master prompt §3 · zero external assets · full RTL via logical properties */
:root{
  --navy:#071A2D; --cnavy:#0D2A44; --avia:#1F6E8C; --gold:#C9A227; --gold2:#E3C566; --cyan:#38BDF8;
  --cloud:#F4F7FA; --slate:#334155; --ok:#15803D; --warn:#B45309; --bad:#B91C1C; --info:#2563EB;
  --line:rgba(13,42,68,.10); --line2:rgba(13,42,68,.16); --mut:#5B6B7E; --card:#FFFFFF;
  --r-sm:10px; --r-md:14px; --r-lg:18px;
  --sh-sm:0 1px 2px rgba(7,26,45,.05),0 2px 8px rgba(7,26,45,.05);
  --sh-md:0 4px 10px rgba(7,26,45,.08),0 10px 28px rgba(7,26,45,.10);
  --sh-lg:0 12px 30px rgba(7,26,45,.16),0 30px 70px rgba(7,26,45,.18);
  --grad-gold:linear-gradient(180deg,#DDB93F,#C9A227 55%,#B8931F);
  --grad-navy:linear-gradient(180deg,#0F3050,#0D2A44 60%,#0A2136);
  --ff:-apple-system,BlinkMacSystemFont,"Segoe UI","SF Pro Text",Tahoma,Arial,sans-serif;
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{margin:0;color:var(--navy);font:15.5px/1.6 var(--ff);
  background:
    radial-gradient(900px 480px at 85% -60px, rgba(201,162,39,.10), transparent 60%),
    radial-gradient(1100px 620px at -140px 105%, rgba(31,110,140,.10), transparent 60%),
    linear-gradient(180deg,#F7FAFD,var(--cloud) 320px);
  background-attachment:fixed}
img,svg{max-width:100%}
a{color:var(--avia);text-decoration-thickness:1px;text-underline-offset:2px}
a:hover{color:var(--cnavy)}
code{font-family:"SF Mono",Consolas,Menlo,monospace;background:#EDF2F7;padding:1px 6px;border-radius:6px;font-size:.9em}
h1{font-size:1.62rem;margin:.15rem 0 .3rem;letter-spacing:-.015em;font-weight:750}
h2{font-size:1.14rem;margin:1.6rem 0 .65rem;color:var(--cnavy);letter-spacing:-.008em;font-weight:700}
h3{font-size:1rem;margin:.2rem 0 .55rem;color:var(--cnavy);font-weight:700}
h4{font-size:.92rem;margin:1rem 0 .4rem;color:var(--cnavy);font-weight:700}
:focus-visible{outline:3px solid var(--gold);outline-offset:2px;border-radius:6px}
button{font:inherit;color:inherit}
.num{font-variant-numeric:tabular-nums}
.muted{color:var(--mut)} .center{text-align:center}
.overdue{color:var(--bad);font-weight:700} .okc{color:var(--ok);font-weight:700}
.flag{color:var(--warn);font-size:.78rem;font-weight:650}
.kicker{font-size:.7rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--avia)}
[dir=rtl] .kicker,[dir=rtl] .ngh,[dir=rtl] thead th{letter-spacing:0}

/* motion */
@keyframes rise{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:none}}
@keyframes pop{from{opacity:0;transform:scale(.965) translateY(8px)}to{opacity:1;transform:none}}
@keyframes glow{0%,100%{opacity:.55}50%{opacity:.9}}
main.pg>*,.lmain.pg>*{animation:rise .5s cubic-bezier(.22,.75,.25,1) both}
main.pg>*:nth-child(1){animation-delay:.02s}main.pg>*:nth-child(2){animation-delay:.06s}
main.pg>*:nth-child(3){animation-delay:.10s}main.pg>*:nth-child(4){animation-delay:.14s}
main.pg>*:nth-child(5){animation-delay:.18s}main.pg>*:nth-child(n+6){animation-delay:.22s}
.lmain.pg>*:nth-child(2){animation-delay:.08s}.lmain.pg>*:nth-child(3){animation-delay:.15s}
.lmain.pg>*:nth-child(n+4){animation-delay:.22s}

/* banner */
.banner{background:linear-gradient(90deg,#8F1414,#B91C1C 45%,#8F1414);color:#fff;text-align:center;
  font-weight:750;font-size:.78rem;letter-spacing:.09em;padding:7px 12px;position:sticky;top:0;z-index:60;
  text-shadow:0 1px 0 rgba(0,0,0,.2)}
[dir=rtl] .banner{letter-spacing:.02em}

/* topbar */
.top{display:flex;justify-content:space-between;align-items:center;color:#fff;
  padding:9px 16px;gap:10px;position:sticky;top:33px;z-index:50;
  background:linear-gradient(180deg,rgba(10,31,50,.97),rgba(7,26,45,.97));
  backdrop-filter:saturate(1.3) blur(8px);-webkit-backdrop-filter:saturate(1.3) blur(8px);
  border-bottom:1px solid rgba(201,162,39,.35);box-shadow:0 6px 22px rgba(7,26,45,.28)}
.top::after{content:"";position:absolute;inset-inline:0;bottom:-1px;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold) 30%,var(--gold2) 50%,var(--gold) 70%,transparent)}
.brand{display:flex;align-items:center;gap:11px;color:#fff;text-decoration:none}
.brand .mark{filter:drop-shadow(0 2px 6px rgba(201,162,39,.45))}
.bname{font-weight:750;letter-spacing:.015em;font-size:1.02rem}
.tright{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.rolebadge{background:rgba(31,110,140,.28);border:1px solid rgba(56,189,248,.45);border-radius:999px;
  padding:4px 13px;font-size:.79rem;font-weight:650;backdrop-filter:blur(4px)}

/* layout */
.wrap{display:flex;min-height:calc(100vh - 150px)}
.side{flex:0 0 244px;background:linear-gradient(180deg,#0E2C4A 0%,#0B2338 55%,#081D30 100%);
  color:#E6EDF3;padding:16px 10px 34px;border-inline-end:1px solid rgba(201,162,39,.18)}
.ngroup{margin-bottom:14px}
.ngh{display:flex;align-items:center;gap:7px;padding:7px 12px 5px;font-size:.68rem;letter-spacing:.15em;
  text-transform:uppercase;color:#8FA9BF;font-weight:800}
.ngh .ic{width:13px;height:13px;color:var(--gold);opacity:.9}
.nitem{display:flex;justify-content:space-between;align-items:center;gap:8px;color:#DCE7F0;text-decoration:none;
  padding:8px 13px;font-size:.9rem;border-radius:10px;margin:1px 2px;
  border-inline-start:3px solid transparent;transition:background .15s,color .15s,border-color .15s,transform .15s}
.nitem:hover{background:rgba(255,255,255,.07);color:#fff;transform:translateX(2px)}
[dir=rtl] .nitem:hover{transform:translateX(-2px)}
.nitem.on{background:linear-gradient(90deg,rgba(201,162,39,.20),rgba(201,162,39,.06));
  border-inline-start-color:var(--gold);color:#fff;font-weight:700;
  box-shadow:inset 0 0 0 1px rgba(201,162,39,.22)}
.nbadge{background:var(--grad-gold);color:var(--navy);border-radius:999px;padding:0 9px;font-size:.72rem;
  font-weight:800;box-shadow:0 1px 4px rgba(201,162,39,.5)}
main{flex:1;padding:22px 26px 70px;max-width:1180px}
main:focus{outline:none}
.foot{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;
  background:linear-gradient(180deg,#0A2136,#071A2D);color:#9FB2C4;
  padding:13px 18px;font-size:.75rem;border-top:1px solid rgba(201,162,39,.25)}

/* ============ LOGIN — hero ============ */
.lmain{max-width:1060px;margin:0 auto;padding:30px 22px 80px}
.hero{position:relative;text-align:center;padding:44px 18px 30px;isolation:isolate}
.heroGlow{position:absolute;inset:auto 0 auto 0;top:-30px;margin:auto;width:420px;height:300px;z-index:-1;
  background:radial-gradient(closest-side,rgba(201,162,39,.22),rgba(201,162,39,.07) 55%,transparent 75%);
  animation:glow 5.5s ease-in-out infinite}
.heroMark{display:inline-flex;align-items:center;justify-content:center;width:118px;height:118px;border-radius:50%;
  background:radial-gradient(circle at 32% 26%,#123454,#0A2136 68%);
  box-shadow:0 0 0 1px rgba(201,162,39,.55),0 0 0 8px rgba(201,162,39,.10),0 0 0 9px rgba(201,162,39,.28),var(--sh-md)}
.lname{font-size:clamp(1.7rem,4.6vw,2.35rem);font-weight:800;letter-spacing:-.02em;margin-top:18px;
  background:linear-gradient(115deg,var(--navy) 20%,var(--avia) 60%,var(--navy));
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:var(--navy)}
[dir=rtl] .lname{letter-spacing:0}
.lsub{color:var(--mut);font-size:1.02rem;max-width:56ch;margin:8px auto 0}
.seedpill{display:inline-flex;align-items:center;gap:9px;margin-top:16px;padding:6px 15px;border-radius:999px;
  background:#fff;border:1px solid rgba(201,162,39,.5);box-shadow:var(--sh-sm);
  font-size:.74rem;color:var(--slate);font-variant-numeric:tabular-nums}
.seedpill b{color:var(--cnavy)}
.lgroup{margin-top:26px}
.lgh{display:flex;align-items:center;gap:12px;margin:0 2px 10px}
.lgh::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,rgba(201,162,39,.55),rgba(13,42,68,.10))}
.rolegrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(226px,1fr));gap:12px}
.rolecard{position:relative;background:var(--card);border:1px solid var(--line);border-radius:var(--r-md);
  padding:14px 14px 12px;text-align:start;cursor:pointer;display:flex;flex-direction:column;gap:6px;
  box-shadow:var(--sh-sm);transition:transform .18s cubic-bezier(.2,.7,.3,1.2),box-shadow .18s,border-color .18s}
.rolecard:hover{transform:translateY(-3px);border-color:rgba(201,162,39,.65);box-shadow:var(--sh-md)}
.rolecard:active{transform:translateY(-1px) scale(.99)}
.rmono{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  background:var(--grad-navy);color:var(--gold2);font-weight:800;font-size:.72rem;letter-spacing:.04em;
  box-shadow:inset 0 0 0 1px rgba(201,162,39,.5),0 2px 6px rgba(7,26,45,.25)}
.rname{font-weight:750;color:var(--cnavy);font-size:.95rem}
.rdesc{font-size:.79rem;color:var(--mut);line-height:1.45}
.rchips{display:flex;gap:6px;margin-top:2px;flex-wrap:wrap}
.rchips:empty{display:none}
.lfoot{color:var(--mut);font-size:.75rem;margin-top:30px;text-align:center}

/* page head */
.phead{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;flex-wrap:wrap;margin-bottom:14px}
.phead h1{position:relative;padding-bottom:9px}
.phead h1::after{content:"";position:absolute;inset-inline-start:1px;bottom:0;width:52px;height:3px;border-radius:3px;
  background:linear-gradient(90deg,var(--gold),rgba(201,162,39,.15))}
.lead{color:var(--mut);margin:.3rem 0 0;max-width:72ch}

/* grid, widgets, KPI */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(232px,1fr));gap:13px;margin:12px 0 6px}
.widget,.kpi{position:relative;background:var(--card);border:1px solid var(--line);border-radius:var(--r-md);
  padding:14px;box-shadow:var(--sh-sm);transition:transform .18s,box-shadow .18s,border-color .18s}
.widget:hover,.kpi:hover{transform:translateY(-2px);box-shadow:var(--sh-md);border-color:rgba(201,162,39,.45)}
.widget.wide,.kpi.wide{grid-column:span 2}
.kpi::before{content:"";position:absolute;top:0;inset-inline:14px;height:3px;border-radius:0 0 4px 4px;
  background:linear-gradient(90deg,var(--avia),var(--gold));opacity:.85}
.wrow{display:flex;justify-content:space-between;gap:8px;align-items:center;padding:5px 0;
  border-bottom:1px dashed rgba(13,42,68,.10);font-size:.86rem;flex-wrap:wrap}
.wrow:last-of-type{border-bottom:0}
.wsub{color:var(--mut);font-size:.78rem}
.wv{font-weight:750}
.wlink{display:inline-block;margin-top:9px;font-size:.8rem;font-weight:650}
.krow{display:flex;justify-content:space-between;align-items:flex-start;gap:6px}
.ktitle{font-size:.8rem;color:var(--slate);font-weight:700;letter-spacing:.01em}
.kflip{background:none;border:0;cursor:pointer;color:var(--avia);padding:3px;border-radius:8px;transition:transform .2s,color .15s}
.kflip:hover{color:var(--cnavy);transform:rotate(180deg)}
.kval{font-size:1.85rem;font-weight:800;color:var(--cnavy);margin:.3rem 0 .1rem;letter-spacing:-.02em;
  font-variant-numeric:tabular-nums;unicode-bidi:isolate}
.kunit{font-size:.82rem;color:var(--mut);margin-inline-start:5px;font-weight:650}
.ksub{font-size:.8rem;color:var(--mut)}
.kfoot{display:flex;justify-content:space-between;align-items:center;gap:6px;margin-top:9px;flex-wrap:wrap}
.asof{font-size:.7rem;color:var(--mut)}
.na{color:var(--mut);font-size:1.1rem;font-weight:650}
.kback{border-top:1px dashed var(--line2);margin-top:10px;padding-top:10px;animation:rise .3s ease both}
.kformula{font-family:"SF Mono",Consolas,Menlo,monospace;background:var(--grad-navy);color:#DCE7F0;
  border-radius:10px;padding:8px 11px;font-size:.81rem;overflow-x:auto;box-shadow:inset 0 1px 0 rgba(255,255,255,.06)}
.kin{font-size:.78rem;margin-top:8px}
.kin span{color:var(--slate);font-weight:750}
.kin ul{margin:.3rem 0 0;padding-inline-start:18px}
.knote{font-size:.76rem;color:var(--mut);margin:.5rem 0 0}
.spark{margin-top:7px}.spark.big svg{width:100%}
.sparks{display:block}

/* chips & pills */
.chip{display:inline-block;border-radius:999px;padding:2px 10px;font-size:.66rem;font-weight:800;
  letter-spacing:.05em;border:1px solid transparent;text-transform:uppercase}
[dir=rtl] .chip{letter-spacing:0}
.chip-OEM_PUBLIC{background:#E3F0F6;color:#155E75;border-color:#9CC9DA}
.chip-GOV_PUBLIC{background:#E4ECFB;color:#1E40AF;border-color:#AAC2F0}
.chip-STANDARD{background:#E8EBF0;color:#334155;border-color:#C2CAD5}
.chip-SYNTHETIC{background:#F8EFD4;color:#7A5E0E;border-color:#E0C66E}
.chip-DERIVED{background:#E2F2E6;color:#166534;border-color:#A2D2AF}
.chip-USER_INPUT{background:#EDE9FE;color:#5B21B6;border-color:#CBBCFB}
.chip-REQUIRES_VALIDATION{background:#FCE4E4;color:#991B1B;border-color:#F0AEAE}
.chip-ext{background:#FDEBD7;color:#9A3412;border-color:#F3BC8C}
.chip-ro{background:#E8EBF0;color:#334155;border-color:#C2CAD5}
.chip-crit{background:#FCE4E4;color:#991B1B;border-color:#F0AEAE}
.rag{display:inline-block;width:11px;height:11px;border-radius:50%;flex:0 0 auto;box-shadow:0 0 0 3px rgba(13,42,68,.05)}
.rag-G{background:var(--ok)}.rag-A{background:var(--warn)}.rag-R{background:var(--bad)}
.ragpill,.stpill{display:inline-block;border-radius:8px;padding:2px 10px;font-size:.74rem;font-weight:750}
.ragpill.rag-G{background:#E2F2E6;color:#166534}.ragpill.rag-A{background:#FBEEDC;color:#92400E}.ragpill.rag-R{background:#FCE4E4;color:#991B1B}
.stpill{background:#E8EBF0;color:#334155}
.st-ok{background:#E2F2E6;color:#166534}.st-warn{background:#FBEEDC;color:#92400E}.st-bad{background:#FCE4E4;color:#991B1B}.st-info{background:#E4ECFB;color:#1E40AF}
.wo-Completed{background:#E2F2E6;color:#166534}.wo-InProgress{background:#E4ECFB;color:#1E40AF}
.wo-AwaitingParts,.as-AWP{background:#FBEEDC;color:#92400E}
.as-SVC{background:#E2F2E6;color:#166534}.as-MX{background:#E4ECFB;color:#1E40AF}.as-MOD{background:#EDE9FE;color:#5B21B6}.as-STG{background:#E8EBF0;color:#334155}
.obs-EOL,.obs-OBS{background:#FCE4E4;color:#991B1B}.obs-LTB{background:#F8EFD4;color:#7A5E0E}.obs-NRND{background:#FBEEDC;color:#92400E}.obs-Active{background:#E2F2E6;color:#166534}
.st-Open{background:#FBEEDC;color:#92400E}.st-InWork{background:#E4ECFB;color:#1E40AF}.st-AwaitingOEM{background:#EDE9FE;color:#5B21B6}.st-Closed{background:#E2F2E6;color:#166534}
.delta{font-weight:750;font-size:.85rem;unicode-bidi:isolate}
.delta.good{color:var(--ok)}.delta.bad{color:var(--bad)}

/* buttons */
.btn{background:var(--grad-navy);color:#fff;border:1px solid rgba(255,255,255,.10);border-radius:11px;
  padding:8px 16px;cursor:pointer;font-weight:700;display:inline-flex;align-items:center;gap:7px;
  box-shadow:var(--sh-sm),inset 0 1px 0 rgba(255,255,255,.10);transition:transform .15s,box-shadow .15s,filter .15s}
.btn:hover{filter:brightness(1.12);transform:translateY(-1px);box-shadow:var(--sh-md)}
.btn:active{transform:translateY(0) scale(.98)}
.btn.sm{padding:5px 11px;font-size:.8rem;border-radius:9px}
.btn.gold{background:var(--grad-gold);border-color:rgba(122,94,14,.35);color:#241B04;text-shadow:0 1px 0 rgba(255,255,255,.25)}
.btn.ghost{background:rgba(255,255,255,.08);color:inherit;border-color:rgba(255,255,255,.35);box-shadow:none}
.btn.ghost:hover{background:rgba(255,255,255,.16)}
.btn.warnb{background:linear-gradient(180deg,#CE2B2B,#B91C1C);border-color:rgba(0,0,0,.15)}
.btn[disabled]{opacity:.4;cursor:default;transform:none}
.linkbtn{background:none;border:0;padding:0;color:var(--avia);cursor:pointer;text-decoration:underline;
  text-underline-offset:2px;font-weight:650}
.ic{width:16px;height:16px;vertical-align:-3px}
.okic{color:var(--ok)}.warnic{color:var(--warn)}.badic{color:var(--bad)}

/* filter chips, forms, tabs */
.chips{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0}
.fchip{background:#fff;border:1px solid var(--line2);border-radius:999px;padding:5px 15px;cursor:pointer;
  font-size:.82rem;font-weight:600;box-shadow:var(--sh-sm);transition:all .15s}
.fchip:hover{border-color:var(--avia);transform:translateY(-1px)}
.fchip.on{background:var(--grad-navy);color:#fff;border-color:var(--cnavy);font-weight:750;
  box-shadow:0 3px 10px rgba(13,42,68,.30)}
.formrow{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:12px 0}
.formrow input,.formrow select{font:inherit;padding:8px 12px;border:1px solid var(--line2);border-radius:11px;
  background:#fff;min-width:120px;box-shadow:var(--sh-sm);transition:border-color .15s,box-shadow .15s}
.formrow input:focus,.formrow select:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,162,39,.18)}
.formrow input[type=search]{min-width:270px}
.tabs{display:flex;gap:4px;background:rgba(13,42,68,.05);padding:4px;border-radius:12px;
  margin:10px 0 14px;flex-wrap:wrap;width:fit-content;max-width:100%}
.tab{background:none;border:0;border-radius:9px;padding:7px 15px;cursor:pointer;font-weight:650;
  color:var(--slate);transition:all .18s}
.tab:hover{color:var(--cnavy)}
.tab.on{color:var(--cnavy);background:#fff;box-shadow:var(--sh-sm);font-weight:750}

/* tables */
.twrap{background:var(--card);border:1px solid var(--line);border-radius:var(--r-md);margin:12px 0;
  overflow:hidden;box-shadow:var(--sh-sm)}
.tbar{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:10px 14px;
  border-bottom:1px solid var(--line);background:linear-gradient(180deg,#FBFDFF,#F5F8FB);flex-wrap:wrap}
.tcount{font-size:.77rem;color:var(--mut);font-weight:600}
.tscroll{overflow-x:auto}
table{border-collapse:collapse;width:100%;font-size:.85rem}
th,td{padding:8px 12px;text-align:start;border-bottom:1px solid rgba(13,42,68,.06);vertical-align:top}
thead th{background:linear-gradient(180deg,#F4F7FA,#EDF2F7);position:sticky;top:0;white-space:nowrap;
  font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;color:var(--slate)}
tbody tr{transition:background .12s}
tbody tr:hover{background:rgba(31,110,140,.05)}
td.num{white-space:nowrap;font-variant-numeric:tabular-nums;unicode-bidi:isolate}
.tsort{background:none;border:0;cursor:pointer;font:inherit;font-weight:800;color:var(--cnavy);padding:0;
  font-size:.72rem;letter-spacing:.06em;text-transform:uppercase}
[dir=rtl] .tsort{letter-spacing:0}
.tpage{display:flex;gap:10px;align-items:center;justify-content:center;padding:9px}
.bar{position:relative;background:#E8EDF2;border-radius:7px;height:17px;min-width:110px;overflow:hidden;
  box-shadow:inset 0 1px 2px rgba(7,26,45,.08)}
.bar i{position:absolute;inset-inline-start:0;top:0;bottom:0;
  background:linear-gradient(90deg,var(--avia),#2A85A8);border-radius:7px}
.bar span{position:relative;font-size:.7rem;font-weight:750;color:var(--navy);padding-inline-start:7px;line-height:17px}

/* charts */
.cfig{background:var(--card);border:1px solid var(--line);border-radius:var(--r-md);padding:14px;margin:12px 0;
  box-shadow:var(--sh-sm)}
.csvg{background:linear-gradient(180deg,#FCFDFF,#F8FBFD);border:1px solid rgba(13,42,68,.05);
  border-radius:10px;padding:8px}
.cfig figcaption{font-size:.76rem;color:var(--mut);margin-top:8px}
.chart{width:100%;height:auto;display:block}
.ax{font-size:10px;fill:#64748B}
.axl{font-size:11px;fill:#334155;font-weight:600}
.hn{font-size:11px;fill:#fff;font-weight:700}

/* ---------- Seed manifest (immutable) ---------- */

  inflation: 0.022,
  realDiscount: 0.030,
  buildRetrievalDate: '2026-07-16'
};
FAC.MANIFEST.nominalDiscount = (1 + FAC.MANIFEST.realDiscount) * (1 + FAC.MANIFEST.inflation) - 1;

/* ---------- Deterministic PRNG ---------- */
FAC.xfnv1a = function (str) {
  let h = 2166136261 >>> 0;
  for (let i = 0; i < str.length; i++) {
    h = Math.imul(h ^ str.charCodeAt(i), 16777619);
  }
  return h >>> 0;
};
FAC.mulberry32 = function (a) {
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
};
FAC.rng = function (label) {
  return FAC.mulberry32(FAC.xfnv1a(FAC.MANIFEST.seed + '::' + label));
};

  pick: (r, arr) => arr[Math.floor(r() * arr.length)],
  int: (r, lo, hi) => lo + Math.floor(r() * (hi - lo + 1)),

(function (G) {
  const R = FAC.R;
  const PLATS = ['CH47','UH60','AH64','NH90','H145'];

  /* ---- Synthetic economic assumptions ---- */
  G.BURN_LPH = { CH47:1150, UH60:640, AH64:520, NH90:600, H145:260 };   // SYNTHETIC planning assumption (AS-01)
  G.ELEMENTS = ['fuel','pol','consumables','repairs','labour','contracts','training','allocations'];
  G.ELEM_LBL = {
    fuel:{en:'Fuel',ar:'الوقود'}, pol:{en:'POL & lubricants',ar:'الزيوت والشحوم'},
    consumables:{en:'Consumables',ar:'الاستهلاكيات'}, repairs:{en:'Component repair',ar:'إصلاح المكوّنات'},
    labour:{en:'Maintenance labour',ar:'أجور الصيانة'}, contracts:{en:'Support contracts',ar:'عقود الإسناد'},
    training:{en:'Training services',ar:'خدمات التدريب'}, allocations:{en:'Base allocations',ar:'مخصصات القاعدة'}
  };
  G.CPFH_MATRIX = { version:'1.0',
    direct:['fuel','pol','consumables','repairs','labour'],
    burdened:['fuel','pol','consumables','repairs','labour','contracts','training','allocations'],
    excluded:[] };

  /* ---- Fuel price series (AED/L, synthetic) ---- */
  (function(){
    const r=FAC.rng('fuelprice'); G.FUEL_PRICE=[]; let p=2.90;
    FAC.FY26_MONTHS.forEach(m=>{ p=Math.max(2.2,Math.min(3.8,p*R.num(r,0.97,1.05))); G.FUEL_PRICE.push({m,aedPerL:R.round(p,3)}); });
    G.FUEL_BUDGET_PRICE=2.85;
  })();

  /* ---- Planned & actual FH for FY26 ---- */
  (function(){
    const r=FAC.rng('fy26fh');
    G.FY26_FH={};
    PLATS.forEach(p=>{
      const util={CH47:28,UH60:32,AH64:24,NH90:18,H145:35}[p];
      const activePlan=G.ASSETS.filter(a=>a.plat===p&&a.status!=='STG').length;
      G.FY26_FH[p]=FAC.FY26_MONTHS.map(m=>{
        const plan=Math.round(activePlan*util);
        const past=m<='2026-06';
        const u=G.USAGE.find(x=>x.m===m&&x.plat===p);
        const act=past?(u?u.fh:Math.round(plan*R.num(r,0.9,1.06))):null;
        const fc=past?null:Math.round(plan*R.num(r,0.96,1.04));
        return {m,plan,act,fc};
      });
    });
  })();

  /* ---- FY26 costs: budget / synthetic actual / forecast ---- */
  (function(){
    const r=FAC.rng('costs');
    const baseMonthly={ /* AED per month per platform, non-fuel elements (SYNTHETIC) */
      CH47:{pol:180e3,consumables:520e3,repairs:1450e3,labour:980e3,contracts:2500e3,training:260e3,allocations:640e3},
      UH60:{pol:210e3,consumables:610e3,repairs:1650e3,labour:1240e3,contracts:1550e3,training:300e3,allocations:720e3},
      AH64:{pol:150e3,consumables:430e3,repairs:1500e3,labour:900e3,contracts:1450e3,training:240e3,allocations:520e3},
      NH90:{pol:140e3,consumables:390e3,repairs:1700e3,labour:760e3,contracts:2000e3,training:210e3,allocations:470e3},
      H145:{pol:90e3, consumables:250e3,repairs:520e3, labour:540e3,contracts:850e3, training:380e3,allocations:300e3}
    };
    const drift={CH47:0.97,UH60:1.02,AH64:1.01,NH90:1.09,H145:0.99}; // actual-vs-budget stories
    G.COSTS=[];
    PLATS.forEach(p=>{
      FAC.FY26_MONTHS.forEach((m,mi)=>{
        const fh=G.FY26_FH[p][mi];
        const price=G.FUEL_PRICE[mi].aedPerL;
        const past=m<='2026-06';
        /* fuel */
        const fuelB=Math.round(fh.plan*G.BURN_LPH[p]*G.FUEL_BUDGET_PRICE);
        G.COSTS.push({m,plat:p,elem:'fuel',measure:'budget',aed:fuelB});
        if(past)G.COSTS.push({m,plat:p,elem:'fuel',measure:'actual',aed:Math.round(fh.act*G.BURN_LPH[p]*price)});
        else G.COSTS.push({m,plat:p,elem:'fuel',measure:'forecast',aed:Math.round(fh.fc*G.BURN_LPH[p]*price)});
        /* other elements */
        Object.keys(baseMonthly[p]).forEach(e=>{
          const b=Math.round(baseMonthly[p][e]*R.num(r,0.97,1.03));
          G.COSTS.push({m,plat:p,elem:e,measure:'budget',aed:b});
          if(past){
            let a=b*drift[p]*R.num(r,0.93,1.09);
            if(p==='NH90'&&e==='repairs')a*=1.12;
            if(p==='CH47'&&e==='labour'&&m<'2026-04')a*=0.88;

          } else {
            G.COSTS.push({m,plat:p,elem:e,measure:'forecast',aed:Math.round(b*drift[p]*R.num(r,0.97,1.05))});
          }
        });
      });
    });
    G.costSum=(f)=>G.COSTS.filter(f).reduce((s,c)=>s+c.aed,0);
  })();

  /* ---- 30-year lifecycle cost (per platform per year) ---- */
  (function(){

/* ============ CALCULATION ENGINE + FORMULA REGISTRY ============ */
FAC.CALC = {};
(function (C) {
  const G = FAC.GEN, M = FAC.MANIFEST;
  const L12 = FAC.HIST_MONTHS.slice(-12);

  /* ---------- helpers ---------- */
  const fhSum = (plat, months) => G.USAGE.filter(u => (!plat || u.plat === plat) && months.includes(u.m)).reduce((s, u) => s + u.fh, 0);

  /* ---------- Reliability & availability ---------- */
  C.ao = function (plat, months) {
    const rows = G.AVAIL.filter(a => (!plat || a.plat === plat) && (months || L12).includes(a.m) && a.ao != null);
    const poss = rows.reduce((s, a) => s + a.possHrs, 0);
    if (!poss) return null;
    const down = rows.reduce((s, a) => s + a.downHrs, 0);
    return (poss - down) / poss;
  };
  C.mtbf = function (plat, system) {
    const fails = G.FAULTS.filter(f => (!plat || f.plat === plat) && (!system || f.system === system) && f.mode === 'Fail');
    const fh = fhSum(plat, L12) * (system ? 1 : 1);
    if (!fails.length) return { v: null, n: 0, fh };
    return { v: fh / fails.length, n: fails.length, fh };
  };
  C.mtbur = function (plat) {
    const rem = G.FAULTS.filter(f => (!plat || f.plat === plat) && f.unschedRemoval);
    const fh = fhSum(plat, L12);
    if (!rem.length) return { v: null, n: 0, fh };
    return { v: fh / rem.length, n: rem.length, fh };
  };
  C.mttr = function (plat) {
    const wos = G.WOS.filter(w => (!plat || w.plat === plat) && w.status === 'Completed' && w.driver === 'UNS' && w.actH);
    if (!wos.length) return { v: null, n: 0 };
    return { v: wos.reduce((s, w) => s + w.actH, 0) / wos.length, n: wos.length };
  };
  C.mdt = function (plat) {
    const ep = G.DOWNTIME.filter(d => (!plat || d.plat === plat) && L12.includes(d.m));
    if (!ep.length) return { v: null, n: 0 };
    return { v: ep.reduce((s, d) => s + d.days * 24, 0) / ep.length, n: ep.length };
  };
  C.ai = function (plat) {
    const mtbf = C.mtbf(plat), mttr = C.mttr(plat);
    if (mtbf.v == null || mttr.v == null) return null;
    return mtbf.v / (mtbf.v + mttr.v);
  };
  C.mmhfh = function (plat) {
    const mh = G.WOS.filter(w => (!plat || w.plat === plat) && w.status === 'Completed' && w.actH).reduce((s, w) => s + w.actH, 0);
    const fh = fhSum(plat, FAC.HIST_MONTHS);           // matched long window (completed WOs span history)
    return fh ? mh / fh : null;
  };
  C.dispatch = function (plat) {
    const r = FAC.rng('dispatch-' + (plat || 'fleet'));
    const sor = G.USAGE.filter(u => (!plat || u.plat === plat) && L12.includes(u.m)).reduce((s, u) => s + u.sorties, 0);
    if (!sor) return null;
    const rate = { CH47: 0.012, UH60: 0.009, AH64: 0.011, NH90: 0.016, H145: 0.007 }[plat] || 0.011;
    const aborts = Math.round(sor * rate * (0.9 + 0.2 * r()));
    return { v: 1 - aborts / sor, aborts, sorties: sor };
  };
  C.schedCompliance = function (plat) {
    const done = G.WOS.filter(w => (!plat || w.plat === plat) && w.status === 'Completed' && w.planned);
    if (!done.length) return null;
    const r = FAC.rng('sched-' + (plat || 'all'));
    const onTime = done.filter(() => r() < 0.86).length;
    return onTime / done.length;
  };
  C.cann = function (plat) {
    const rem = G.FAULTS.filter(f => (!plat || f.plat === plat) && f.unschedRemoval).length;
    return Math.round(rem * 0.08);
  };
  C.backlogHrs = function (site) {
    return G.WOS.filter(w => (!site || w.site === site) && !['Completed', 'Cancelled'].includes(w.status) && w.due < M.asOfDate)
      .reduce((s, w) => s + w.estH, 0);
  };
  C.demandHrs = function (site, horizonDays) {
    const lim = new Date(M.asOfDate + 'T12:00:00Z'); lim.setUTCDate(lim.getUTCDate() + horizonDays);
    const cut = lim.toISOString().slice(0, 10);
    return G.WOS.filter(w => (!site || w.site === site) && !['Completed', 'Cancelled'].includes(w.status) && w.due <= cut)
      .reduce((s, w) => s + w.estH, 0);
  };
  C.capacityHrs = function (site, days) {
    const sites = site ? [FAC.GEN.siteById(site)] : G.SITES;
    return sites.reduce((s, x) => s + x.techs, 0) * 130 * (days / 30);
  };

  /* ---------- Supply ---------- */
  C.fillRate = function (filterFn) {
    const parts = G.PARTS.filter(filterFn || (() => true));
    let demand = 0, served = 0;
    parts.forEach(p => {
      const rows = G.LEDGER.filter(l => l.pn === p.pn);
      const dem = L12.reduce((s, m) => s + p.dem[FAC.HIST_MONTHS.indexOf(m)], 0);
      const iss = rows.reduce((s, l) => s + l.issues, 0);
      demand += dem; served += Math.min(iss, dem);
    });
    return demand ? served / demand : null;
  };
  C.dos = function (p) {
    const daily = p.dem.slice(-12).reduce((s, x) => s + x, 0) / 365;
    const oh = G.STOCK[p.pn].onHand;
    return daily > 0 ? oh / daily : null;
  };
  C.turns = function (p) {
    const rows = G.LEDGER.filter(l => l.pn === p.pn);
    const iss = rows.reduce((s, l) => s + l.issues, 0);
    const avgInv = rows.reduce((s, l) => s + (l.open + l.close) / 2, 0) / rows.length;
    return avgInv > 0 ? iss / avgInv : null;
  };
  C.demandStats = function (p) {
    const d12 = p.dem.slice(-12);
    const mean = d12.reduce((s, x) => s + x, 0) / 12;
    const sd = Math.sqrt(d12.reduce((s, x) => s + (x - mean) * (x - mean), 0) / 11 || 0);
    return { meanM: mean, sdM: sd, meanD: mean * 12 / 365, sdD: sd / Math.sqrt(30.4) };
  };
  C.ropss = function (p, z, leadOverride) {
    const st = C.demandStats(p);
    const L = (leadOverride != null ? leadOverride : p.lead);
    const ss = z * st.sdD * Math.sqrt(L);
    const rop = st.meanD * L + ss;
    return { ss, rop, z, L, meanD: st.meanD, sdD: st.sdD };
  };
  C.eoq = function (p, orderCost, holdRate) {
    const D = p.dem.slice(-12).reduce((s, x) => s + x, 0);
    const H = (holdRate || 0.22) * p.unitAed;
    if (!D || !H) return null;
    return Math.sqrt(2 * D * (orderCost || 450) / H);
  };
  C.forecastEval = function (p) {
    const hist = p.dem, n = hist.length, hold = 6;
    let maeM = 0, maeN = 0, biasNum = 0, actSum = 0;
    for (let i = n - hold; i < n; i++) {
      const f3 = (hist[i - 1] + hist[i - 2] + hist[i - 3]) / 3;
      const naive = hist[i - 1];
      maeM += Math.abs(f3 - hist[i]); maeN += Math.abs(naive - hist[i]);
      biasNum += (f3 - hist[i]); actSum += hist[i];
    }
    return { bias: actSum ? biasNum / actSum : null, mase: maeN ? (maeM / hold) / (maeN / hold) : null, method: 'MA(3)' };
  };
  C.stockouts = () => Object.values(G.STOCK).reduce((s, x) => s + (x.stockoutM > 0 ? 1 : 0), 0);
  C.aogDays = function () {
    return G.DOWNTIME.filter(d => d.cause === 'AwaitingParts' && L12.includes(d.m)).reduce((s, d) => s + d.days, 0);
  };

  /* ---------- Cost ---------- */
  C.cpfh = function (plat, mode, measure) {
    const elems = mode === 'burdened' ? G.CPFH_MATRIX.burdened : G.CPFH_MATRIX.direct;
    const meas = measure || 'actual';
    const months = meas === 'actual' ? FAC.FY26_MONTHS.filter(m => m <= '2026-06')
                 : meas === 'forecast' ? FAC.FY26_MONTHS.filter(m => m > '2026-06')
                 : meas === 'budget' ? FAC.FY26_MONTHS : [];
    const cost = G.COSTS.filter(c => (!plat || c.plat === plat) && c.measure === meas && elems.includes(c.elem) && months.includes(c.m))
      .reduce((s, c) => s + c.aed, 0);
    let fh = 0;
    (plat ? [plat] : Object.keys(G.FY26_FH)).forEach(p => {
      G.FY26_FH[p].forEach(x => { if (months.includes(x.m)) fh += (meas === 'actual' ? (x.act || 0) : meas === 'forecast' ? (x.fc || 0) : (x.plan || 0)); });
    });
    if (!fh) return { v: null, fh: 0, cost };
    return { v: cost / fh, fh, cost };
  };
  C.budgetVar = function (plat) {
    const mo = FAC.FY26_MONTHS.filter(m => m <= '2026-06');
    const b = G.COSTS.filter(c => (!plat || c.plat === plat) && c.measure === 'budget' && mo.includes(c.m)).reduce((s, c) => s + c.aed, 0);
    const a = G.COSTS.filter(c => (!plat || c.plat === plat) && c.measure === 'actual' && mo.includes(c.m)).reduce((s, c) => s + c.aed, 0);
    return { budget: b, actual: a, varAed: b - a, favourable: b - a >= 0 };
  };
  C.fuelVariance = function (plat) {
    const mo = FAC.FY26_MONTHS.filter(m => m <= '2026-06');
    let pv = 0, vv = 0;
    (plat ? [plat] : Object.keys(G.FY26_FH)).forEach(p => {
      G.FY26_FH[p].forEach((x, i) => {
        if (!mo.includes(x.m)) return;
        const price = G.FUEL_PRICE[i].aedPerL, bp = G.FUEL_BUDGET_PRICE, burn = G.BURN_LPH[p];
        pv += (price - bp) * burn * (x.act || 0);
        vv += ((x.act || 0) - x.plan) * burn * bp;
      });
    });
    return { priceVar: -pv, volVar: -vv };   // negative = adverse under (budget − actual) convention
  };
  C.pvOf = (y, v) => G.pv(y, v);
  C.euacOf = function (pv, N) { const r = M.realDiscount; return pv * r / (1 - Math.pow(1 + r, -N)); };
  C.fisher = () => (1 + M.realDiscount) * (1 + M.inflation) - 1;
  C.evm = function (u) {
    if (!u || u.acAed <= 0 || u.pvAed <= 0 || u.evAed < 0) return { valid: false };
    const cv = u.evAed - u.acAed, sv = u.evAed - u.pvAed;
    const cpi = u.evAed / u.acAed, spi = u.evAed / u.pvAed;
    const eac1 = u.bacAed / cpi;
    const eac2 = u.acAed + (u.bacAed - u.evAed);
    const eac3 = spi > 0 ? u.acAed + (u.bacAed - u.evAed) / (cpi * spi) : null;
    return { valid: true, cv, sv, cpi, spi, eac1, eac2, eac3 };
  };

  /* ---------- Portfolio health (weights v1.0 — governed demo assumption) ---------- */
  C.health = function () {
    const W = { gates: .15, eis: .15, avail: .20, fill: .15, budget: .15, risks: .10, obs: .10 };
    const gatesOnTime = 1 - Math.min(1, G.GATE_CALENDAR.filter(g => g.due < M.asOfDate).length / Math.max(1, G.GATE_CALENDAR.length));
    const eis = G.EIS.reduce((s, e) => s + e.readyPct, 0) / (G.EIS.length * 100);
    const avail = Math.min(1, (C.ao(null) || 0) / 0.82);
    const fill = Math.min(1, (C.fillRate() || 0) / 0.92);
    const bv = C.budgetVar(null);
    const budget = Math.max(0, 1 - Math.abs(bv.varAed) / (bv.budget * 0.12));
    const critOpen = G.RISKS.filter(r => r.status !== 'Closed' && r.likelihood * r.impact >= 16).length;
    const risks = Math.max(0, 1 - critOpen / 6);
    const near = G.OBS.filter(o => o.shortageM <= '2027-12' && o.mitigation === 'monitor').length;
    const obs = Math.max(0, 1 - near / 4);
    const score = 100 * (W.gates * gatesOnTime + W.eis * eis + W.avail * avail + W.fill * fill + W.budget * budget + W.risks * risks + W.obs * obs);
    return { score: Math.round(score), parts: { gatesOnTime, eis, avail, fill, budget, risks, obs }, weights: W, critOpen, nearShortages: near };
  };

  /* ---------- Baseline snapshot for scenarios & cockpit ---------- */
  C.baseline = function () {
    if (C._base) return C._base;
    const fhY = Object.keys(G.FY26_FH).reduce((s, p) => s + G.FY26_FH[p].reduce((t, x) => t + x.plan, 0), 0);
    const fuelY = G.COSTS.filter(c => c.elem === 'fuel' && c.measure === 'budget').reduce((s, c) => s + c.aed, 0);
    const maintY = G.COSTS.filter(c => ['repairs', 'labour', 'consumables'].includes(c.elem) && c.measure === 'budget').reduce((s, c) => s + c.aed, 0);
    C._base = {
      ao: C.ao(null), fill: C.fillRate(), cpfhD: C.cpfh(null, 'direct', 'actual').v,
      backlog: C.backlogHrs(null), fhYear: fhY, fuelYear: fuelY, maintYear: maintY,
      pv: Object.values(G.LCC_TOTALS).reduce((s, t) => s + t.pv, 0),
      aog: C.aogDays(), invParts: G.PARTS.length
    };
    return C._base;
  };

  /* ---------- Scenario engine (coefficients v1.0, all effects declared) ---------- */
  C.runScenario = function (def) {
    const B = C.baseline(), K = G.SCN_COEF, v = def.vars, out = [];
    const push = (metric, base, adj, unit, path) => out.push({ metric, base, adj, unit, path });
    const shares = G.LCC_SHARES;
    if (v.util) {
      const u = v.util;
      push('fhYear', B.fhYear, B.fhYear * (1 + u), 'FH', 'util → FH');
      push('fuelYear', B.fuelYear, B.fuelYear * (1 + u), 'AED', 'FH → fuel cash');
      push('maintYear', B.maintYear, B.maintYear * (1 + u * 0.85), 'AED', 'FH → maintenance demand (85% variable)');
      const gap = Math.max(0, u) * 100 * 0.85 * 0.25;
      push('ao', B.ao, B.ao - gap * K.aoPerBacklogPt / 100, 'pct', 'demand > capacity → backlog → Ao');
      push('cpfhD', B.cpfhD, B.cpfhD * (1 + u * 0.85 * 0.7) / (1 + u), 'AED/FH', 'variable cost & FH move together; fixed labour spreads');
      push('pv', B.pv, B.pv * (shares.fuelShare * (1 + u) + shares.maintShare * (1 + u * 0.85) + shares.fixedShare), 'AED', 'annual cash → 30-yr PV');
    }
    if (v.fuel) {
      push('fuelYear', B.fuelYear, B.fuelYear * (1 + v.fuel), 'AED', 'price → fuel cash');
      push('cpfhD', B.cpfhD, B.cpfhD + (B.fuelYear * v.fuel) / B.fhYear, 'AED/FH', 'fuel cash / FH');
      push('pv', B.pv, B.pv * (1 + shares.fuelShare * v.fuel), 'AED', 'fuel share of PV');
    }
    if (v.lead) {
      push('ss', 1, Math.sqrt(1 + v.lead), '×', 'SS ∝ √L');
      push('fill', B.fill, B.fill + K.fillPerLeadPct * v.lead, 'pct', 'longer pipeline → fill');
      push('ao', B.ao, B.ao + K.aoPerLeadPct * v.lead, 'pct', 'fill → AOG → Ao');
      push('invest', 0, 0.08 * v.lead / 0.25 * 12e6, 'AED', 'ΔSS × unit cost (indicative)');
    }
    if (v.tat) {
      push('fill', B.fill, B.fill + K.fillPerTatPct * v.tat, 'pct', 'WIP ↑ → serviceable ↓');
      push('ao', B.ao, B.ao + K.aoPerTatPct * v.tat, 'pct', 'serviceable ↓ → Ao');
    }
    if (v.removal) {
      push('maintYear', B.maintYear, B.maintYear * (1 + K.maintCashPerRemovalPct * v.removal), 'AED', 'removals → repair cash');
      push('fill', B.fill, B.fill + K.fillPerRemovalPct * v.removal, 'pct', 'demand ↑ → fill');
      push('ao', B.ao, B.ao + K.aoPerRemovalPct * v.removal, 'pct', 'removals → downtime');
      push('pv', B.pv, B.pv * (1 + shares.maintShare * K.maintCashPerRemovalPct * v.removal), 'AED', 'maint share of PV');
    }
    if (v.budget) {
      const b = v.budget, dim = b > 0 ? K.fillDim : 1;
      push('fill', B.fill, B.fill + K.fillPerBudgetPct * b * dim, 'pct', 'funding → stock depth (assumption-based)');
      push('ao', B.ao, B.ao + K.aoPerBudgetPct * b * dim, 'pct', 'fill → Ao (lagged)');
      push('cash', 0, B.maintYear * 0.35 * b, 'AED', 'spares budget line');
    }
    if (v.fsrSlow) push('ao', B.ao, B.ao + K.aoFsrSlow, 'pct', 'resolution time ↑ → awaiting-OEM downtime');
    if (v.mluDelayMo) {
      push('pv', B.pv, B.pv - G.UPG_PV * (1 - 1 / Math.pow(1 + M.realDiscount, v.mluDelayMo / 12)), 'AED', 'upgrade cash shifts right (discounting)');
      push('obsExposure', 2, 4, 'items', 'exposure window extends');
    }
    if (v.upgCost) push('pv', B.pv, B.pv + G.UPG_PV * v.upgCost, 'AED', 'upgrade share of PV');
    if (v.ltb) {
      const ltbCost = G.OBS.filter(o => o.status === 'LTB').reduce((s, o) => s + o.mitCostAed, 0);
      push('cash2027', 0, ltbCost, 'AED', 'one-time buy');
      push('shortageRisk', 2, 0, 'items', 'covered items');
      push('pv', B.pv, B.pv + ltbCost / Math.pow(1 + M.realDiscount, 2), 'AED', 'discounted buy');
    }
    if (v.retireShiftMo) {
      const yrs = v.retireShiftMo / 12;
      const osY = B.pv * 0.033;
      if (yrs < 0) push('pv', B.pv, B.pv + osY * yrs * 0.9, 'AED', 'O&S avoided in final years; residual earlier');
      else push('pv', B.pv, B.pv + osY * yrs * 1.15, 'AED', 'extra O&S + aging uplift + obsolescence bump');
    }
    return { def, rows: out, coef: K.version, snapshotHash: FAC.hashObject({ id: def.id, v, out }) };
  };

      + '</div></div>';

  /* ---------- tables ---------- */
  FAC._tables = {};
  U.table = function (o) {
    FAC._tables[o.id] = o;
    const st = FAC.state.tbl[o.id] || (FAC.state.tbl[o.id]={s:o.defaultSort||0,d:o.defaultDir||1,p:0});
    let rows = o.rows.slice();
    const col = o.cols[st.s];
    if (col && col.k) rows.sort((a,b)=>{const va=col.v?col.v(a):a[col.k],vb=col.v?col.v(b):b[col.k];
      return (va>vb?1:va<vb?-1:0)*st.d;});
    const per = o.per||12, pages = Math.max(1,Math.ceil(rows.length/per));
    if (st.p>=pages) st.p=pages-1;
    const view = rows.slice(st.p*per,(st.p+1)*per);

      +'<div class="tscroll"><table><thead><tr>';
    o.cols.forEach((c,i)=>{ h+='<th scope="col"><button class="tsort" data-tsort="'+o.id+':'+i+'">'+esc(c.h)
      +(st.s===i?(st.d>0?' ↑':' ↓'):'')+'</button></th>'; });
    h+='</tr></thead><tbody>';
    view.forEach(r=>{ h+='<tr'+(o.rowAttr?(' '+o.rowAttr(r)):'')+'>';
      o.cols.forEach(c=>{ h+='<td'+(c.num?' class="num" dir="ltr"':'')+'>'+(c.r?c.r(r):esc(String(r[c.k]!=null?r[c.k]:'—')))+'</td>'; });
      h+='</tr>'; });
    if(!view.length) h+='<tr><td colspan="'+o.cols.length+'" class="muted center">'+esc(t('ui_none'))+'</td></tr>';
    h+='</tbody></table></div>';
    if(pages>1){ h+='<div class="tpage">';
      h+='<button class="btn sm" data-tpage="'+o.id+':-1" '+(st.p===0?'disabled':'')+'>‹</button>';
      h+='<span dir="ltr">'+(st.p+1)+' / '+pages+'</span>';
      h+='<button class="btn sm" data-tpage="'+o.id+':1" '+(st.p>=pages-1?'disabled':'')+'>›</button></div>'; }
    h+='</div>';
    return h;
  };

  /* ---------- CSV export with governance metadata + injection neutralization ---------- */
  U.neutralize = v => { const s=String(v==null?'':v).replace(/"/g,'""'); return /^[=+\-@]/.test(s)?"'"+s:s; };
  U.exportCsv = function (id) {
    const o = FAC._tables[id]; if (!o) return;
    const neut = U.neutralize;
    const lines = [];
    lines.push('# '+t('bannerLine'));
    lines.push('# '+t('csv_dataset')+': '+(o.title||id));
    lines.push('# '+t('csv_filters')+': '+(o.filterDesc||t('ui_none')));
    lines.push('# '+t('ui_asof')+': '+FAC.MANIFEST.asOfDate+' · '+t('csv_seed')+': '+FAC.MANIFEST.seed+' · hash '+FAC.GEN.DATASET_HASH);
    lines.push('# '+t('csv_units')+': '+(o.units||'AED / SI'));
    lines.push('# '+t('csv_origin')+': OEM_PUBLIC | GOV_PUBLIC | STANDARD | SYNTHETIC | DERIVED | REQUIRES_VALIDATION');
    lines.push('# '+t('csv_generated')+': '+new Date().toISOString());
    lines.push(o.cols.map(c=>'"'+neut(c.h)+'"').join(','));
    o.rows.forEach(r=>{ lines.push(o.cols.map(c=>{ const v=c.csv?c.csv(r):(c.v?c.v(r):r[c.k]); return '"'+neut(v)+'"'; }).join(',')); });
    const blob = new Blob(['\ufeff'+lines.join('\r\n')], {type:'text/csv;charset=utf-8'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download='FAC_'+id+'_'+FAC.MANIFEST.asOfDate+'.csv'; document.body.appendChild(a); a.click();
    setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},400);
    FAC.audit('aud_export', id, o.title||id);
  };

  /* ---------- SVG chart kit (LTR canvases, data-table fallback) ---------- */
  const NS='http://www.w3.org/2000/svg';
  const AX='#64748B', GRID='#E2E8F0';
  function frame(w,h,title,desc){ return {open:'<svg viewBox="0 0 '+w+' '+h+'" class="chart" role="img" aria-label="'+esc(title)+'"><title>'+esc(title)+'</title><desc>'+esc(desc||'')+'</desc>', close:'</svg>'}; }
  function scale(min,max,a,b){ const d=(max-min)||1; return v=>a+(v-min)/d*(b-a); }
  function ticks(min,max,n){ const out=[],st=(max-min)/n; for(let i=0;i<=n;i++)out.push(min+st*i); return out; }

  U.chartWrap = function (id, svg, tableHtml, capt) {
    return '<figure class="cfig"><div class="csvg" dir="ltr">'+svg+'</div>'
      +(capt?'<figcaption>'+esc(capt)+'</figcaption>':'')
      +'<button class="btn sm ghost" data-flip="ct-'+id+'" aria-expanded="false">'+esc(t('ui_dataTable'))+'</button>'
      +'<div id="ct-'+id+'" hidden class="ctable">'+tableHtml+'</div></figure>';
  };

  U.line = function (o) {
    const w=o.w||640,h=o.h||260,P={l:56,r:14,t:14,b:34};
    let mn=o.min!=null?o.min:Infinity,mx=o.max!=null?o.max:-Infinity;
    o.series.forEach(s=>s.pts.forEach(v=>{if(v==null)return;mn=Math.min(mn,v);mx=Math.max(mx,v);}));
    if(mn===Infinity){mn=0;mx=1;} if(mn===mx){mx=mn+1;}
    const pad=(mx-mn)*0.08; if(o.min==null)mn-=pad; if(o.max==null)mx+=pad;
    const X=scale(0,o.labels.length-1,P.l,w-P.r), Y=scale(mn,mx,h-P.b,P.t);
    const f=frame(w,h,o.title,o.desc); let s=f.open;
    ticks(mn,mx,4).forEach(v=>{ s+='<line x1="'+P.l+'" y1="'+Y(v)+'" x2="'+(w-P.r)+'" y2="'+Y(v)+'" stroke="'+GRID+'"/>';
      s+='<text x="'+(P.l-6)+'" y="'+(Y(v)+4)+'" text-anchor="end" class="ax">'+(o.yFmt?o.yFmt(v):FAC.fmt.n(v))+'</text>'; });
    const step=Math.max(1,Math.ceil(o.labels.length/8));
    o.labels.forEach((L,i)=>{ if(i%step)return; s+='<text x="'+X(i)+'" y="'+(h-10)+'" text-anchor="middle" class="ax">'+esc(L)+'</text>'; });
    if(o.band){ s+='<rect x="'+P.l+'" y="'+Y(o.band[1])+'" width="'+(w-P.l-P.r)+'" height="'+(Y(o.band[0])-Y(o.band[1]))+'" fill="#15803D" opacity="0.07"/>'; }
    o.series.forEach(se=>{ let d=''; se.pts.forEach((v,i)=>{ if(v==null){d+='M';return;} d+=(d===''||d.slice(-1)==='M'?(d===''?'M':'')+' ':' L ')+X(i)+' '+Y(v); });
      d=d.replace(/M L/g,'M').replace(/^M\s*M/,'M');
      s+='<path d="'+d.trim()+'" fill="none" stroke="'+(se.color||'#1F6E8C')+'" stroke-width="2.4"/>';
      se.pts.forEach((v,i)=>{ if(v==null)return; if(se.dots===false)return; s+='<circle cx="'+X(i)+'" cy="'+Y(v)+'" r="2.6" fill="'+(se.color||'#1F6E8C')+'"/>'; }); });
    if(o.markX!=null){ s+='<line x1="'+X(o.markX)+'" y1="'+P.t+'" x2="'+X(o.markX)+'" y2="'+(h-P.b)+'" stroke="#B91C1C" stroke-dasharray="4 3"/>'; }
    s+=f.close;
    if(o.series.length>1){ s+='<div class="legend" dir="auto">'+o.series.map(se=>'<span><i style="background:'+(se.color||'#1F6E8C')+'"></i>'+esc(se.name||'')+'</span>').join('')+'</div>'; }
    return s;
  };

  U.bars = function (o) {   // grouped or stacked vertical bars
    const w=o.w||640,h=o.h||260,P={l:56,r:14,t:14,b:34};
    const n=o.labels.length, groups=o.series.length;
    let mx=0; if(o.stacked){ for(let i=0;i<n;i++){let s2=0;o.series.forEach(se=>s2+=(se.pts[i]||0));mx=Math.max(mx,s2);} }
    else o.series.forEach(se=>se.pts.forEach(v=>mx=Math.max(mx,v||0)));
    mx=mx*1.08||1;
    const Y=scale(0,mx,h-P.b,P.t), slot=(w-P.l-P.r)/n;
    const f=frame(w,h,o.title,o.desc); let s=f.open;
    ticks(0,mx,4).forEach(v=>{ s+='<line x1="'+P.l+'" y1="'+Y(v)+'" x2="'+(w-P.r)+'" y2="'+Y(v)+'" stroke="'+GRID+'"/>';
      s+='<text x="'+(P.l-6)+'" y="'+(Y(v)+4)+'" text-anchor="end" class="ax">'+(o.yFmt?o.yFmt(v):FAC.fmt.n(v))+'</text>'; });
    const step=Math.max(1,Math.ceil(n/10));
    o.labels.forEach((L,i)=>{ if(i%step)return; s+='<text x="'+(P.l+slot*(i+0.5))+'" y="'+(h-10)+'" text-anchor="middle" class="ax">'+esc(L)+'</text>'; });
    for(let i=0;i<n;i++){
      if(o.stacked){ let acc=0;
        o.series.forEach(se=>{ const v=se.pts[i]||0; const top=Y(acc+v); const hh=Y(acc)-Y(acc+v);
          if(hh>0.2)s+='<rect x="'+(P.l+slot*i+slot*0.15)+'" y="'+top+'" width="'+(slot*0.7)+'" height="'+hh+'" fill="'+se.color+'"/>';
          acc+=v; });
      } else {
        const bw=slot*0.7/groups;
        o.series.forEach((se,g)=>{ const v=se.pts[i]||0;
          s+='<rect x="'+(P.l+slot*i+slot*0.15+bw*g)+'" y="'+Y(v)+'" width="'+(bw-1)+'" height="'+((h-P.b)-Y(v))+'" fill="'+se.color+'"/>'; });
      }
    }
    s+=f.close;
    s+='<div class="legend" dir="auto">'+o.series.map(se=>'<span><i style="background:'+se.color+'"></i>'+esc(se.name||'')+'</span>').join('')+'</div>';
    return s;
  };

  U.hbar = function (o) {   // horizontal bars (Pareto / rankings)
    const w=o.w||640, rowH=26, P={l:o.lPad||190,r:60,t:8,b:8};
    const h=P.t+P.b+o.items.length*rowH;
    const mx=Math.max.apply(null,o.items.map(i=>Math.abs(i.v)))||1;
    const X=scale(0,mx,0,w-P.l-P.r);
    const f=frame(w,h,o.title,o.desc); let s=f.open;
    o.items.forEach((it,i)=>{ const y=P.t+i*rowH;
      s+='<text x="'+(P.l-8)+'" y="'+(y+rowH*0.65)+'" text-anchor="end" class="axl">'+esc(it.label)+'</text>';
      s+='<rect x="'+P.l+'" y="'+(y+5)+'" width="'+X(Math.abs(it.v))+'" height="'+(rowH-10)+'" fill="'+(it.color||'#1F6E8C')+'"/>';
      s+='<text x="'+(P.l+X(Math.abs(it.v))+6)+'" y="'+(y+rowH*0.65)+'" class="ax">'+(o.fmt?o.fmt(it.v):FAC.fmt.n(it.v))+'</text>'; });
    return s+f.close;
  };

  U.tornado = function (o) {
    const w=o.w||640,rowH=30,P={l:150,r:70,t:10,b:10};
    const h=P.t+P.b+o.items.length*rowH;
    const mx=Math.max.apply(null,o.items.map(i=>Math.max(Math.abs(i.lo),Math.abs(i.hi))))||1;
    const mid=P.l+(w-P.l-P.r)/2, X=scale(0,mx,0,(w-P.l-P.r)/2);
    const f=frame(w,h,o.title,o.desc); let s=f.open+'<line x1="'+mid+'" y1="'+P.t+'" x2="'+mid+'" y2="'+(h-P.b)+'" stroke="'+AX+'"/>';
    o.items.forEach((it,i)=>{ const y=P.t+i*rowH;
      s+='<text x="'+(P.l-8)+'" y="'+(y+rowH*0.62)+'" text-anchor="end" class="axl">'+esc(it.label)+'</text>';
      s+='<rect x="'+(it.lo<0?mid-X(Math.abs(it.lo)):mid)+'" y="'+(y+6)+'" width="'+X(Math.abs(it.lo))+'" height="'+(rowH-12)+'" fill="#1F6E8C"/>';
      s+='<rect x="'+(it.hi<0?mid-X(Math.abs(it.hi)):mid)+'" y="'+(y+6)+'" width="'+X(Math.abs(it.hi))+'" height="'+(rowH-12)+'" fill="#C9A227"/>';
      s+='<text x="'+(w-P.r+4)+'" y="'+(y+rowH*0.62)+'" class="ax">'+(o.fmt?o.fmt(it.hi):FAC.fmt.n(it.hi))+'</text>'; });
    return s+f.close;
  };

  U.donut = function (o) {
    const w=o.w||220,h=o.h||220,cx=w/2,cy=h/2,r=Math.min(w,h)/2-8,ir=r*0.62;
    const tot=o.segs.reduce((s,x)=>s+x.v,0)||1;
    const f=frame(w,h,o.title,o.desc); let s=f.open,a0=-Math.PI/2;
    o.segs.forEach(sg=>{ const a1=a0+2*Math.PI*sg.v/tot;
      const x0=cx+r*Math.cos(a0),y0=cy+r*Math.sin(a0),x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1);
      const X0=cx+ir*Math.cos(a1),Y0=cy+ir*Math.sin(a1),X1=cx+ir*Math.cos(a0),Y1=cy+ir*Math.sin(a0);
      const big=(a1-a0)>Math.PI?1:0;
      s+='<path d="M '+x0+' '+y0+' A '+r+' '+r+' 0 '+big+' 1 '+x1+' '+y1+' L '+X0+' '+Y0+' A '+ir+' '+ir+' 0 '+big+' 0 '+X1+' '+Y1+' Z" fill="'+sg.color+'"/>';
      a0=a1; });
    if(o.center)s+='<text x="'+cx+'" y="'+(cy+5)+'" text-anchor="middle" class="dcenter">'+esc(o.center)+'</text>';
    s+=f.close;
    s+='<div class="legend" dir="auto">'+o.segs.map(sg=>'<span><i style="background:'+sg.color+'"></i>'+esc(sg.label)+' <b dir="ltr">'+FAC.fmt.n(sg.v)+'</b></span>').join('')+'</div>';

  };

  U.heat = function (o) {  // 5×5 risk matrix

        +'<text x="'+(x+cell/2-1)+'" y="'+(y+cell/2+4)+'" text-anchor="middle" class="hn">'+items.length+'</text>'; }
    }
    s+='<text x="'+(P.l-12)+'" y="'+(P.t+cell*2.5)+'" text-anchor="end" class="axl" transform="rotate(-90 '+(P.l-12)+' '+(P.t+cell*2.5)+')">'+esc(o.yLab)+'</text>';
    s+='<text x="'+(P.l+cell*2.5)+'" y="'+(h-14)+'" text-anchor="middle" class="axl">'+esc(o.xLab)+'</text>';
    for(let i=1;i<=5;i++){ s+='<text x="'+(P.l+cell*(i-0.5))+'" y="'+(P.t+cell*5+16)+'" text-anchor="middle" class="ax">'+i+'</text>';
      s+='<text x="'+(P.l-6)+'" y="'+(P.t+cell*(5-i)+cell*0.6)+'" text-anchor="end" class="ax">'+i+'</text>'; }
    return s+f.close;
  };

  U.spark = function (pts, w, h, color) {
    w=w||120;h=h||30;
    const vals=pts.filter(v=>v!=null); if(!vals.length)return '';
    let mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals); if(mn===mx)mx=mn+1;

  /* ============ COCKPIT ============ */
  P.cockpit = function(){
    const ao=C.ao(null), ai=C.ai(null), mtbf=C.mtbf(null), mtbur=C.mtbur(null), mttr=C.mttr(null), mdt=C.mdt(null);
    const mmh=C.mmhfh(null), disp=C.dispatch(null), fill=C.fillRate(), cp=C.cpfh(null,'direct','actual'), h=C.health();
    const dosMed=(arr=>{const a=arr.filter(x=>x!=null).sort((x,y)=>x-y);return a.length?a[Math.floor(a.length/2)]:null;})(G.PARTS.slice(0,250).map(p=>C.dos(p)));
    const cards=[
      U.kpi({id:'c1',title:T('kpi_ao'),value:F.pct(ao,1),formulaId:'ao',origin:'DERIVED',inputs:[T('ui_l12'),T('cockpit_aoIn')],spark:U.spark(aoFleetPts(L12))}),
      U.kpi({id:'c2',title:T('kpi_ai'),value:ai!=null?F.pct(ai,1):null,formulaId:'ai',origin:'DERIVED',inputs:['MTBF '+(mtbf.v?F.n(Math.round(mtbf.v)):'—')+' FH','MTTR '+(mttr.v?F.n1(mttr.v):'—')+' h']}),
      U.kpi({id:'c3',title:T('kpi_mtbf'),value:mtbf.v?F.n(Math.round(mtbf.v)):null,unit:'FH',formulaId:'mtbf',origin:'DERIVED',inputs:['n = '+mtbf.n+(mtbf.n<20?' · '+T('ui_smallSample'):''),'FH '+F.n(mtbf.fh)]}),
      U.kpi({id:'c4',title:T('kpi_mtbur'),value:mtbur.v?F.n(Math.round(mtbur.v)):null,unit:'FH',formulaId:'mtbur',origin:'DERIVED',inputs:['n = '+mtbur.n]}),
      U.kpi({id:'c5',title:T('kpi_mttr'),value:mttr.v?F.n1(mttr.v):null,unit:'h',formulaId:'mttr',origin:'DERIVED',inputs:['n = '+mttr.n]}),
      U.kpi({id:'c6',title:T('kpi_mdt'),value:mdt.v?F.n(Math.round(mdt.v)):null,unit:'h',formulaId:'mdt',origin:'DERIVED',inputs:['n = '+mdt.n]}),
      U.kpi({id:'c7',title:T('kpi_mmhfh'),value:mmh!=null?F.n2(mmh):null,unit:'h/FH',formulaId:'mmhfh',origin:'DERIVED',inputs:[T('cockpit_matched')]}),
      U.kpi({id:'c8',title:T('kpi_disp'),value:disp?F.pct(disp.v,1):null,formulaId:'disp',origin:'SYNTHETIC',inputs:[T('cockpit_aborts')+' '+F.n(disp.aborts),T('cockpit_sorties')+' '+F.n(disp.sorties)]}),
      U.kpi({id:'c9',title:T('kpi_fill'),value:F.pct(fill,1),formulaId:'fill',origin:'DERIVED',inputs:[T('ui_l12')]}),
      U.kpi({id:'c10',title:T('kpi_dos'),value:dosMed!=null?F.n(Math.round(dosMed)):null,unit:T('ui_days'),formulaId:'dos',origin:'DERIVED',inputs:[T('w_medianSample')]}),
      U.kpi({id:'c11',title:T('kpi_cpfhD'),value:cp.v!=null?F.n(Math.round(cp.v)):null,unit:T('ui_aedFh'),formulaId:'cpfhD',origin:'DERIVED',inputs:['FH '+F.n(cp.fh),T('ui_matrix')+' v'+G.CPFH_MATRIX.version],note:T('cpfhMatrixNote')}),
      U.kpi({id:'c12',title:T('kpi_health'),value:F.n(h.score),unit:'/100',formulaId:'health',origin:'DERIVED',inputs:[T('hw_weightsV')+' 1.0'],note:T('governedWeightsNote')})
    ].join('');
    const trend=U.chartWrap('aotr',U.line({title:T('cockpit_aoTrend'),desc:T('cockpit_aoTrendD'),labels:FAC.HIST_MONTHS.map(mLbl),
      series:[{name:T('ui_fleet'),pts:aoFleetPts(),color:'#0D2A44'}].concat(FAC.PLATFORMS.map(p=>({name:platName(p.id),pts:aoPts(p.id),color:p.color,dots:false}))),
      yFmt:v=>Math.round(v)+'%',band:[82,95],markX:FAC.HIST_MONTHS.indexOf('2025-03')}),
      U.table({id:'aotbl',title:T('cockpit_aoTrend'),cols:[{h:T('ui_month'),k:'m'}].concat(FAC.PLATFORMS.map(p=>({h:platName(p.id),k:p.id,num:true,v:r=>r[p.id]}))),
        rows:FAC.HIST_MONTHS.map(m=>{const o={m:mLbl(m)};FAC.PLATFORMS.forEach(p=>{const a=G.AVAIL.find(x=>x.m===m&&x.plat===p.id);o[p.id]=a&&a.ao!=null?F.n1(a.ao*100):'—';});return o;})}),
      T('cockpit_outlierCapt'));
    const causes={}; G.DOWNTIME.filter(d=>L12.includes(d.m)).forEach(d=>causes[d.cause]=(causes[d.cause]||0)+d.days);
    const donut=U.donut({title:T('cockpit_dtCauses'),desc:'',segs:Object.keys(causes).map((c,i)=>({label:T('dt_'+c),v:causes[c],color:['#1F6E8C','#B45309','#334155','#2563EB','#15803D'][i%5]}))});
    return U.pageHead(T('pt_cockpit'),T('pl_cockpit'))
      + '<div class="grid">'+cards+'</div>'
      + '<div class="two">'+trend+'<figure class="cfig"><div class="csvg" dir="ltr">'+donut+'</div><figcaption>'+FAC.fmt.esc(T('ui_l12'))+' · '+FAC.fmt.esc(T('ui_days'))+'</figcaption></figure></div>';
  };

  /* ============ ACTIONS (unified due list) ============ */
  P.actions = function(){
    const items=[];
    G.GATE_CALENDAR.forEach(g=>{ if(g.due<='2026-08-31') items.push({type:T('act_gate'),ref:g.prog+' '+T('gate_'+g.gate),due:g.due,owner:T('role_PGM'),route:'#/lifecycle'});});
    G.WOS.filter(w=>!['Completed','Cancelled'].includes(w.status)&&w.due<FAC.MANIFEST.asOfDate).slice(0,40).forEach(w=>items.push({type:T('act_wo'),ref:w.id+' · '+bi(w.task),due:w.due,owner:w.site,route:'#/maintenance'}));
    G.ACTIONS.filter(a=>a.status!=='Closed').forEach(a=>items.push({type:T('act_action'),ref:a.id+' · '+bi(a.title),due:a.due,owner:T('role_'+a.owner),route:'#/raid'}));
    G.AGREEMENTS.filter(a=>a.end<='2026-12-31').forEach(a=>items.push({type:T('act_agr'),ref:a.id+' · '+bi(a.title),due:a.end,owner:a.supplier,route:'#/contracts'}));
    G.OBS.filter(o=>o.mitigation==='monitor'&&o.shortageM<='2027-12').forEach(o=>items.push({type:T('act_obs'),ref:o.id+' · '+o.pn,due:o.shortageM+'-01',owner:T('role_ENG'),route:'#/obsolescence'}));
    items.sort((a,b)=>a.due.localeCompare(b.due));
    return U.pageHead(T('pt_actions'),T('pl_actions'))
      + U.table({id:'acts',title:T('pt_actions'),cols:[
          {h:T('ui_type'),k:'type'},
          {h:T('ui_item'),k:'ref',r:r=>'<a href="'+r.route+'">'+FAC.fmt.esc(r.ref)+'</a>'},
          {h:T('ui_due'),k:'due',num:true,r:r=>{const od=r.due<FAC.MANIFEST.asOfDate;return '<span class="'+(od?'overdue':'')+'">'+F.date(r.due)+'</span>';}},
          {h:T('ui_owner'),k:'owner'}],rows:items,per:14});

      let act='';

        act=canApprove
          ?'<button class="btn sm gold" data-gapprove="'+i+'">'+FAC.fmt.esc(T('lc_approve'))+'</button>'
          :'<span class="muted">'+FAC.fmt.esc(T('lc_awaiting'))+'</span>';

  /* ============ LCC ============ */
  P.lcc = function(){
    const cards=FAC.PLATFORMS.map(p=>{const t2=G.LCC_TOTALS[p.id];
      return U.kpi({id:'l'+p.id,title:platName(p.id),value:F.moneyM(t2.pv),sub:'EUAC '+F.moneyM(t2.euac)+' × '+t2.years+' '+T('ui_years'),formulaId:'pv',origin:'DERIVED',
        inputs:[T('lcc_undisc')+' '+F.moneyM(t2.undisc),'r = 3.0% · N = '+t2.years]});}).join('');
    const fleetPv=Object.values(G.LCC_TOTALS).reduce((s,t2)=>s+t2.pv,0);
    /* fleet stacked by category per year */
    const cats=['os','upg','obs','ret'];
    const catCol={os:'#1F6E8C',upg:'#C9A227',obs:'#B45309',ret:'#334155'};
    const years=FAC.YEARS;
    const series=cats.map(c=>({name:T('lcc_'+c),color:catCol[c],pts:years.map(y=>G.LCC.filter(l=>l.y===y).reduce((s,l)=>s+l[c],0)/1e6)}));
    const stack=U.bars({title:T('lcc_curve'),desc:'',stacked:true,labels:years.map(y=>String(y).slice(2)),series,yFmt:v=>F.n(Math.round(v))});
    /* MC histogram: re-run deterministic runs */
    const mcRng=FAC.rng('mc'); const shares=G.LCC_SHARES; const basePv=G.MC.base; const upgPv=G.UPG_PV;
    const runs=[]; for(let i=0;i<2000;i++){ const Uv=FAC.R.triangular(mcRng,0.90,1.00,1.10),Mv=FAC.R.triangular(mcRng,0.90,1.00,1.18),Fv=FAC.R.triangular(mcRng,0.85,1.00,1.25),Kv=FAC.R.triangular(mcRng,0.95,1.00,1.20);
      runs.push(basePv*(shares.fuelShare*Uv*Fv+shares.maintShare*Uv*Mv+shares.fixedShare)+(Kv-1)*upgPv);}
    runs.sort((a,b)=>a-b);
    const bins=18, lo=runs[0], hi=runs[runs.length-1], bw=(hi-lo)/bins, hcounts=new Array(bins).fill(0);
    runs.forEach(v=>hcounts[Math.min(bins-1,Math.floor((v-lo)/bw))]++);
    const hist=U.bars({title:T('lcc_mcHist'),desc:'',labels:hcounts.map((_,i)=>i%3===0?F.n(Math.round((lo+bw*i)/1e6)):''),series:[{name:'runs',color:'#1F6E8C',pts:hcounts}],yFmt:v=>F.n(v)});
    const tor=U.tornado({title:T('lcc_tornado'),desc:'',items:G.TORNADO.map(t2=>({label:T('tor_'+t2.name),lo:t2.lo/1e6,hi:t2.hi/1e6})),fmt:v=>(v>=0?'+':'−')+F.n(Math.abs(Math.round(v)))+'M'});
    return U.pageHead(T('pt_lcc'),T('pl_lcc'))
      + U.note('info',E(T('convText'))+' · '+E(T('longHorizonNote')))
      + '<div class="grid">'+cards
      + U.kpi({id:'lfl',title:T('ui_fleet')+' PV',value:F.moneyM(fleetPv),formulaId:'pv',origin:'DERIVED',wide:true,
          inputs:['P50 '+F.moneyM(G.MC.p50),'P80 '+F.moneyM(G.MC.p80),T('lcc_mcN')+' '+F.n(G.MC.n)],note:T('lcc_mcNote')})
      + '</div>'
      + '<figure class="cfig"><div class="csvg" dir="ltr">'+stack+'</div><figcaption>'+E(T('lcc_curveCapt'))+' (M AED, '+E(T('lcc_realTerms'))+')</figcaption></figure>'
      + '<div class="two">'
      + '<figure class="cfig"><div class="csvg" dir="ltr">'+hist+'</div><figcaption>'+E(T('lcc_mcCapt'))+'</figcaption></figure>'
      + '<figure class="cfig"><div class="csvg" dir="ltr">'+tor+'</div><figcaption>'+E(T('lcc_torCapt'))+'</figcaption></figure>'
      + '</div>'
      + U.note('info','<b>'+E(T('rt_residual'))+':</b> '+E(T('lcc_resNote')));
  };

          +U.kpi({id:'rb2',title:T('rb_buyCost'),value:F.money(buyC),origin:'SYNTHETIC',inputs:[T('sp_lead')+' '+p.lead+' '+T('ui_days')]})
          +'</div>'+U.note('ok','<b>'+E(T('rb_rec'))+':</b> '+E(T(rec==='repair'?'rb_recRepair':'rb_recBuy')))
          +'<p class="muted">'+E(T('rb_note'))+'</p></div>';

        const ah=G.LCC_TOTALS.AH64;

    const saved=FAC.state.scenarioRuns||[];

        {h:'#',k:'i',num:true,v:(r,i)=>r.ts,r:r=>'<span dir="ltr">'+E(r.ts.slice(0,16).replace('T',' '))+'</span>'},

      + panel
      + '<h2>'+E(T('scn_savedRuns'))+'</h2>'
      + U.note('info',E(T('scn_immutable')))
      + savedT;

  function fmtMetric(v,unit){
    if(v==null)return '—';
    if(unit==='pct')return F.pct(v,1);
    if(unit==='AED')return F.moneyM(v);
    if(unit==='×')return '<span dir="ltr">×'+F.n2(v)+'</span>';
    if(unit==='FH')return F.n(Math.round(v))+' FH';
    if(unit==='items')return F.n(v);
    return F.n(Math.round(v));
  }

  /* ============ ASSURANCE (live checks) ============ */
  P.assurance = function(){
    const checks=[];
    const add=(name,ok,detail)=>checks.push({name,ok,detail});
    let bad=0; G.LEDGER.forEach(l=>{if(l.open+l.receipts-l.issues+l.adj!==l.close)bad++;});
    add(T('as_ledger'),bad===0,'n = '+F.n(G.LEDGER.length)+(bad?' · '+bad+' ✗':''));
    let badp=0; G.REPPOOLS.forEach(p=>{const s=p.installed+p.serviceable+p.awaitingRepair+p.inRepair+p.inTransit+p.quarantine+p.condemnedPending; if(s!==p.owned)badp++;});
    add(T('as_pools'),badp===0,'n = '+F.n(G.REPPOOLS.length));
    let neg=0; G.LEDGER.forEach(l=>{if(l.open<0||l.close<0||l.receipts<0||l.issues<0)neg++;});
    Object.values(G.STOCK).forEach(s=>{if(s.onHand<0||s.dueIn<0||s.backorder<0)neg++;});
    G.COSTS.forEach(c=>{if(c.aed<0)neg++;});
    add(T('as_noneg'),neg===0,neg+' ✗');
    const cpZero=C.cpfh('CH47','direct','none'); add(T('as_cpfhGuard'),cpZero.v===null,'FH=0 → '+T('ui_na'));
    const evmBad=C.evm(G.UPGRADES[0]); add(T('as_evmGuard'),evmBad.valid===false,'UPG-01 AC=0');
    const r0=(rows=>rows.reduce((s,l)=>s+l.os+l.upg+l.obs+l.ret+l.res,0))(G.LCC.filter(l=>l.plat==='H145'));
    const pv0=G.LCC.filter(l=>l.plat==='H145').reduce((s,l)=>s+(l.os+l.upg+l.obs+l.ret+l.res)/Math.pow(1.0,(l.y-2026)+1),0);
    add(T('as_pvR0'),Math.abs(r0-pv0)<1,'Σ = PV(r=0)');
    const t2=G.LCC_TOTALS.CH47; const ann=FAC.MANIFEST.realDiscount/(1-Math.pow(1+FAC.MANIFEST.realDiscount,-t2.years));
    add(T('as_euac'),Math.abs(t2.euac-t2.pv*ann)<2,'EUAC = PV·A(r,N)');
    const p=G.PARTS[0], rs=C.ropss(p,1.64); const st=C.demandStats(p);
    const hand=st.meanD*p.lead+1.64*st.sdD*Math.sqrt(p.lead);
    add(T('as_rop'),Math.abs(rs.rop-hand)<0.01,p.pn);
    const enK=Object.keys(FAC.I18N.en).length, arK=Object.keys(FAC.I18N.ar).length;
    const missing=Object.keys(FAC.I18N.en).filter(k=>!(k in FAC.I18N.ar));
    add(T('as_i18n'),enK===arK&&missing.length===0,'EN '+enK+' · AR '+arK);
    let renderFail=0, marker=0;
    const routes=['dashboard','cockpit','actions','capabilities','programmes','lifecycle','eis','platforms','fleet','maintenance','reliability','spares','repairs','fsr','contracts','enablers','config','upgrades','obsolescence','retirement','cost','lcc','scenarios','raid','reports','sources','formulas','quality','audit','admin','about'];
    routes.forEach(rt=>{ try{ const h=P[rt]({}); if(h.indexOf('⟦')>=0)marker++; }catch(e){renderFail++;} });
    add(T('as_routes'),renderFail===0&&marker===0,routes.length+' '+T('ui_routes')+(marker?' · ⟦⟧ '+marker:''));
    const neutTest=U.neutralize('=SUM(A1)').charAt(0)==="'"&&U.neutralize('+X').charAt(0)==="'"&&U.neutralize('ok')==='ok';
    add(T('as_csv'),neutTest,'=,+,−,@ → \u2019');
    const rows=checks.map(c=>({name:c.name,ok:c.ok,detail:c.detail}));
    const pass=rows.filter(r=>r.ok).length;
    return U.pageHead(T('pt_assurance'),T('pl_assurance'))
      + U.kpi({id:'as0',title:T('as_summary'),value:'<span dir="ltr">'+pass+' / '+rows.length+'</span>',origin:'DERIVED',wide:true,

      + U.table({id:'ast',title:T('pt_assurance'),cols:[

          {h:T('ui_status'),k:'ok',r:x=>x.ok?U.stPill('PASS','st-ok'):U.stPill('FAIL','st-bad')},
          {h:T('ui_detail'),k:'detail',r:x=>'<span dir="ltr" class="wsub">'+E(x.detail)+'</span>'}],rows,per:12});
  };

/* Maker-checker rule (unit-testable): no self-approval, approver roles only */
FAC.gateApprove=function(g,roleId){
  const r=FAC.GEN.roleById(roleId);
  if(!r||!r.approver)return {ok:false,reason:'notApprover'};
  if(g.submittedBy===roleId)return {ok:false,reason:'self'};
  g.status='Approved'; g.approvedBy=roleId; return {ok:true};
};

(function () {
  const U=FAC.UI, G=FAC.GEN, P=FAC.PAGES, F=FAC.fmt;
  const T=(k,v)=>FAC.t(k,v);
  const E=FAC.fmt.esc;

  const NAV=[
    ['nav_g_command',   ['dashboard','cockpit','actions']],
    ['nav_g_capability',['capabilities','programmes','lifecycle','eis']],
    ['nav_g_fleet',     ['platforms','fleet','maintenance','reliability','spares','repairs','fsr','contracts','enablers','config']],
    ['nav_g_modern',    ['upgrades','obsolescence','retirement']],
    ['nav_g_cost',      ['cost','lcc','scenarios']],
    ['nav_g_gov',       ['raid','reports','sources','formulas','quality','audit','admin','about','assurance']]
  ];

  FAC.parseRoute=function(){
    let h=(typeof location!=='undefined'?location.hash:'')||'#/';
    if(h==='#')h='#/';
    const m=h.match(/^#\/([a-z]*)\??(.*)$/i);
    const name=(m&&m[1])||'dashboard';
    const params={};
    if(m&&m[2])m[2].split('&').forEach(kv=>{const[k,v]=kv.split('=');if(k)params[decodeURIComponent(k)]=decodeURIComponent(v||'');});
    return {name:name===''?'dashboard':name,params};
  };

  function guard(name){
    if(!FAC.state.role)return name==='login'?'login':'login';
    if(name==='login'||name==='denied')return name;
    const r=G.roleById(FAC.state.role);
    if(!r)return 'login';
    if(name==='admin'&&!r.routes.includes('admin'))return 'denied';
    if(name==='audit'&&!r.routes.includes('audit'))return 'denied';
    if(!r.routes.includes(name))return 'denied';
    return name;
  }

  function badgeCounts(){
    const gates=G.GATE_CALENDAR.filter(g=>g.due<='2026-08-31').length;
    const acts=G.ACTIONS.filter(a=>a.status!=='Closed').length;
    return {actions:gates+acts};
  }

  const NAVIC={nav_g_command:'compass',nav_g_capability:'layers',nav_g_fleet:'gear',nav_g_modern:'spark',nav_g_cost:'coins',nav_g_gov:'shield'};
  function nav(active){
    const r=G.roleById(FAC.state.role); if(!r)return '';
    const b=badgeCounts();
    let h='<nav class="side" aria-label="'+E(T('ui_nav'))+'">';
    NAV.forEach(([gk,items])=>{
      const vis=items.filter(i=>r.routes.includes(i));
      if(!vis.length)return;
      h+='<div class="ngroup"><div class="ngh">'+U.icon(NAVIC[gk]||'layers')+'<span>'+E(T(gk))+'</span></div>';
      vis.forEach(i=>{
        h+='<a class="nitem'+(active===i?' on':'')+'" href="#/'+(i==='dashboard'?'':i)+'">'+E(T('nav_'+i))
          +(i==='actions'&&b.actions?'<span class="nbadge" dir="ltr">'+b.actions+'</span>':'')+'</a>';
      });
      h+='</div>';
    });
    return h+'</nav>';
  }

  function topbar(){
    const r=G.roleById(FAC.state.role);
    return '<header class="top"><div class="tleft"><a href="#/" class="brand">'+U.mark(30)
      +'<span class="bname">'+E(T('appName'))+'</span></a></div>'
      +'<div class="tright">'
      +'<button class="btn sm ghost" data-lang="1" title="'+E(T('ui_lang'))+'">'+U.icon('globe')+' '+(FAC.state.lang==='en'?'العربية':'English')+'</button>'
      +(r?'<span class="rolebadge">'+E(T('role_'+r.id))+(r.readOnly?' · '+E(T('ui_readonly')):'')+'</span>'
      +'<button class="btn sm ghost" data-logout="1">'+E(T('ui_switchRole'))+'</button>':'')
      +'</div></header>';
  }

  function footer(){
    return '<footer class="foot"><span dir="ltr">'+E(FAC.MANIFEST.seed)+' · hash '+G.DATASET_HASH+' · '+FAC.MANIFEST.asOfDate+'</span>'
      +'<span>'+E(T('footerLine'))+'</span></footer>';
  }

  function modalLayer(){
    const m=FAC.state.ui.modal; if(!m)return '';
    if(m.type==='part')return U.modal(T('sp_partDetail'),P.partModal(m.id));
    if(m.type==='report')return U.modal(T('rep_'+m.id),P.reportModal(parseInt(m.id)));
    if(m.type==='block')return U.modal(T('lc_blockedTitle'),U.note('warn',E(T('selfApproveBlocked'))));
    if(m.type==='confirm')return U.modal(T('adm_reset'),'<p>'+E(T('adm_resetConfirm'))+'</p>','<button class="btn warnb" data-resetgo="1">'+E(T('adm_reset'))+'</button>');
    if(m.type==='disclaimer')return U.modal(T('disc_title'),'<div class="prose">'+T('disclaimerBody')+'</div>','<button class="btn gold" data-ack="1">'+E(T('disc_ack'))+'</button>');
    return '';
  }

  FAC.render=function(){
    if(typeof document==='undefined')return;
    const {name,params}=FAC.parseRoute();
    const eff=guard(name);
    if(eff==='denied'&&name!=='denied'){FAC.audit('aud_denied','#/'+name,FAC.state.role);}
    FAC.state.route='#/'+name;
    const page=eff==='login'?P.login():eff==='denied'?P.denied({r:'#/'+name}):(P[eff]?P[eff](params):P.dashboard());
    const banner='<div class="banner" role="note">'+E(T('bannerLine'))+'</div>';
    let html;
    if(eff==='login'){ html=banner+'<main class="lmain pg">'+page+'</main>'+footer(); }
    else { html=banner+topbar()+'<div class="wrap">'+nav(eff)+'<main id="main" class="pg" tabindex="-1">'+page+'</main></div>'+footer(); }
    html+=modalLayer();
    document.getElementById('app').innerHTML=html;
    document.documentElement.lang=FAC.state.lang==='ar'?'ar-AE':'en-GB';
    document.documentElement.dir=FAC.state.lang==='ar'?'rtl':'ltr';
    document.title=T('appName')+' — '+T('pt_'+(eff==='login'?'dashboard':eff),'')||T('appName');
    FAC.persist();
  };

  function go(h){ if(location.hash===h)FAC.render(); else location.hash=h; }

  function onClick(ev){
    const el=ev.target.closest('[data-role],[data-lang],[data-usd],[data-logout],[data-flip],[data-csv],[data-tsort],[data-tpage],[data-filter],[data-tab],[data-gsubmit],[data-gapprove],[data-scnrun],[data-scnsave],[data-part],[data-report],[data-print],[data-mclose],[data-reset],[data-resetgo],[data-riskadd],[data-ack]');
    if(!el)return;
    const D=el.dataset;
    if(D.role!=null){ FAC.state.role=D.role; FAC.audit('aud_login',D.role,''); FAC.state.ui.modal=FAC.state.ui.disclaimerAck?null:{type:'disclaimer'}; go('#/'); return; }
    if(D.ack!=null){ FAC.state.ui.disclaimerAck=true; FAC.state.ui.modal=null; FAC.audit('aud_ack','disclaimer',''); FAC.render(); return; }
    if(D.lang!=null){ FAC.state.lang=FAC.state.lang==='en'?'ar':'en'; FAC.audit('aud_lang',FAC.state.lang,''); FAC.render(); return; }
    if(D.usd!=null){ FAC.state.usd=!FAC.state.usd; FAC.render(); return; }
    if(D.logout!=null){ FAC.state.role=null; go('#/login'); return; }
    if(D.flip!=null){ const t2=document.getElementById(D.flip); if(t2){ const h=t2.hasAttribute('hidden'); if(h)t2.removeAttribute('hidden'); else t2.setAttribute('hidden',''); el.setAttribute('aria-expanded',String(h)); } return; }
    if(D.csv!=null){ U.exportCsv(D.csv); return; }
    if(D.tsort!=null){ const[id,i]=D.tsort.split(':'); const st=FAC.state.tbl[id]; if(st){ if(st.s===+i)st.d*=-1; else {st.s=+i;st.d=1;} st.p=0; } FAC.render(); return; }
    if(D.tpage!=null){ const[id,d]=D.tpage.split(':'); const st=FAC.state.tbl[id]; if(st)st.p+=parseInt(d); FAC.render(); return; }
    if(D.filter!=null){ const idx=D.filter.indexOf(':'); const k=D.filter.slice(0,idx), v=D.filter.slice(idx+1);
      if(v==='')delete FAC.state.filters[k]; else FAC.state.filters[k]=v; FAC.render(); return; }
    if(D.tab!=null){ const[id,i]=D.tab.split(':'); FAC.state.ui[id+'Tab']=+i; FAC.render(); return; }
    if(D.gsubmit!=null){ const sel=document.getElementById('gsel'); if(!sel)return; const[prog,gate]=sel.value.split(':');
      FAC.state.gateDemo=FAC.state.gateDemo||[]; FAC.state.gateDemo.push({prog,gate,submittedBy:FAC.state.role,approvedBy:null,status:'PendingApproval'});
      FAC.audit('aud_submit',prog+' '+gate,''); FAC.render(); return; }
    if(D.gapprove!=null){ const g=(FAC.state.gateDemo||[])[+D.gapprove]; if(!g)return;
      const res=FAC.gateApprove(g,FAC.state.role);
      if(!res.ok){ FAC.state.ui.modal={type:'block'}; FAC.audit('aud_denied',g.prog+' '+g.gate,'self-approval'); }
      else { FAC.audit('aud_approve',g.prog+' '+g.gate,''); }
      FAC.render(); return; }
    if(D.scnrun!=null){ FAC.audit('aud_scnRun','SCN-'+D.scnrun,''); go('#/scenarios?run='+D.scnrun); return; }
    if(D.scnsave!=null){ const def=G.SCENARIOS.find(s=>s.id===+D.scnsave); if(!def)return;
      const res=FAC.CALC.runScenario(def);
      (FAC.state.scenarioRuns=FAC.state.scenarioRuns||[]).unshift({id:def.id,ts:new Date().toISOString(),role:FAC.state.role,hash:res.snapshotHash});
      FAC.audit('aud_scnSave','SCN-'+def.id,res.snapshotHash); FAC.render(); return; }
    if(D.part!=null){ FAC.state.ui.modal={type:'part',id:D.part}; FAC.render(); return; }
    if(D.report!=null){ FAC.state.ui.modal={type:'report',id:D.report}; FAC.audit('aud_report',T('rep_'+D.report),''); FAC.render(); return; }
    if(D.print!=null){ window.print(); return; }
    if(D.mclose!=null){ if(ev.target===el||el.tagName==='BUTTON'){ FAC.state.ui.modal=null; FAC.render(); } return; }
    if(D.reset!=null){ FAC.state.ui.modal={type:'confirm'}; FAC.render(); return; }
    if(D.resetgo!=null){ try{localStorage.removeItem('FAC1');}catch(e){} location.hash='#/login'; location.reload(); return; }
    if(D.riskadd!=null){ const t2=document.getElementById('rk-t'),l=document.getElementById('rk-l'),i=document.getElementById('rk-i');
      if(!t2||!t2.value.trim()){ if(t2)t2.focus(); return; }
      (FAC.state.sessionRisks=FAC.state.sessionRisks||[]).push({id:'R-S'+((FAC.state.sessionRisks.length)+1),
        title:{en:t2.value.trim(),ar:t2.value.trim()},likelihood:+l.value,impact:+i.value,owner:FAC.state.role,due:FAC.MANIFEST.asOfDate,status:'Open',link:null});
      FAC.audit('aud_add','risk',t2.value.trim().slice(0,40)); FAC.render(); return; }
  }

  function onInput(ev){
    const id=ev.target.id;
    if(id==='psearch'){ FAC.state.filters.q=ev.target.value; clearTimeout(FAC._qd);
      FAC._qd=setTimeout(()=>{ const v=document.getElementById('psearch'); FAC.render();
        const nv=document.getElementById('psearch'); if(nv){nv.focus(); nv.setSelectionRange(nv.value.length,nv.value.length);} },350); return; }
    if(id==='pz'||id==='plead'){ const st=FAC.state.ui.pcalc; if(!st)return;
      if(id==='pz')st.z=parseFloat(ev.target.value)||0; else st.lead=parseInt(ev.target.value)||1;
      const m=FAC.state.ui.modal; if(m&&m.type==='part'){ const body=document.querySelector('.mbody'); if(body){ body.innerHTML=FAC.PAGES.partModal(m.id); const z=document.getElementById(id); if(z){z.focus();} } } return; }
  }

  FAC.boot=function(){
    if(typeof document==='undefined')return;
    FAC.restore();
    if(!FAC.state.ui)FAC.state.ui={};
    if(!FAC.state.tbl)FAC.state.tbl={};
    if(FAC.state.role&&!FAC.state.ui.disclaimerAck)FAC.state.ui.modal={type:'disclaimer'};
    document.addEventListener('click',onClick);
    document.addEventListener('input',onInput);
    window.addEventListener('hashchange',FAC.render);
    FAC.render();
  };
  if(typeof document!=='undefined'&&typeof window!=='undefined'){
    if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',FAC.boot);
    else FAC.boot();
  }
})();

</script>
</body>
</html>
